<div class="month-selector">
  <div class="selector-header">
    <h1 class="selector-title">Dashboard</h1>
    <p class="selector-subtitle">Acompanhe suas finanças de forma simples</p>
  </div>

  <div class="selector-controls">
    <button
      type="button"
      class="control-button"
      (click)="prevMonth()"
      aria-label="Mês anterior">
      <fa-icon [icon]="faChevronLeft"></fa-icon>
    </button>

    <button
      mat-stroked-button
      class="month-button"
      (click)="currentMonthClick()">
      <fa-icon [icon]="faCalendar" class="month-icon"></fa-icon>
      {{ getMonthYear() }}
    </button>

    <button
      type="button"
      class="control-button"
      (click)="nextMonth()"
      aria-label="Próximo mês">
      <fa-icon [icon]="faChevronRight"></fa-icon>
    </button>
  </div>
</div>
