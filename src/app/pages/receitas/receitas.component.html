<app-dashboard-layout>
  <app-loading-overlay [isLoading]="isLoading"></app-loading-overlay>

  <div class="receitas-page">
    <!-- Header Section -->
    <app-financial-page-header
      [title]="'Receitas'"
      [subtitle]="'Gerencie suas entradas financeiras'"
      [total]="totalIncome"
      [type]="'receita'">
    </app-financial-page-header>

    <!-- Month Selector -->
    <app-month-selector (monthChanged)="onMonthChanged($event)"></app-month-selector>

    <!-- Summary Cards -->
    <app-filter-summary
      [releases]="getFilteredReleasesForSummary()"
      [type]="'receita'">
    </app-filter-summary>

    <!-- Advanced Filters -->
    <app-advanced-filters
      [categories]="incomeCategories"
      [paymentMethods]="paymentMethods"
      [filters]="filters"
      [sort]="sort"
      (filtersChange)="onFiltersChange($event)"
      (sortChange)="onSortChange($event)">
    </app-advanced-filters>

    <!-- Empty States or List -->
    <div *ngIf="hasNoIncomesInMonth">
      <app-financial-empty-state
        [type]="'receita'"
        [emptyStateType]="'no-items'"
        (addClick)="onFabClick()">
      </app-financial-empty-state>
    </div>

    <div *ngIf="searchHasNoResults">
      <app-financial-empty-state
        [type]="'receita'"
        [emptyStateType]="'no-results'">
      </app-financial-empty-state>
    </div>

    <app-bulk-actions-bar
      *ngIf="filteredIncomes.length > 0"
      [selectedCount]="selectedIds.length"
      [type]="'receita'"
      [categories]="incomeCategories"
      [paymentMethods]="paymentMethods"
      [isLoading]="isLoadingBulk"
      (cancelSelection)="onCancelSelection()"
      (markAsPaid)="onBulkMarkAsPaid()"
      (markAsPaidWithDate)="onBulkMarkAsPaidWithDate($event)"
      (changeCategory)="onBulkChangeCategory($event)"
      (changePaymentMethod)="onBulkChangePaymentMethod($event)">
    </app-bulk-actions-bar>

    <app-financial-list
      *ngIf="filteredIncomes.length > 0"
      [items]="filteredIncomes"
      [type]="'receita'"
      [selectionMode]="true"
      [selectedIds]="selectedIds"
      (itemClick)="onIncomeClick($event)"
      (selectionChange)="onSelectionChange($event)">
    </app-financial-list>
  </div>

  <app-floating-action-button *appPermission="'create'" (clicked)="onFabClick()"></app-floating-action-button>
</app-dashboard-layout>

<app-transaction-modal
  [isOpen]="isModalOpen"
  [releaseToEdit]="selectedRelease"
  (close)="onCloseModal()"
  (saved)="onTransactionSaved()">
</app-transaction-modal>
