<div class="forgot-password-container">
  <!-- Decorative background circles -->
  <div class="background-decoration">
    <div class="circle circle-1"></div>
    <div class="circle circle-2"></div>
  </div>

  <!-- Forgot Password Card -->
  <div class="forgot-password-card">
    <!-- Logo and Branding -->
    <div class="branding-section">
      <div class="logo-wrapper">
        <fa-icon [icon]="faWallet" class="logo-icon"></fa-icon>
      </div>
      <h1 class="brand-title">
        Finanças<span class="brand-title-primary">Pro</span>
      </h1>
      <p class="brand-subtitle">Controle suas finanças de forma simples</p>
    </div>

    <!-- Back Button -->
    <button type="button" (click)="goBack()" class="back-button">
      <fa-icon [icon]="faArrowLeft" class="back-icon"></fa-icon>
      Voltar
    </button>

    <!-- Form Title and Instructions -->
    <h2 class="form-title">Recuperar Senha</h2>
    <p class="form-instruction">
      Digite seu email para receber o link de recuperação
    </p>

    <!-- Forgot Password Form -->
    <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="forgot-password-form">
      <!-- Email Field -->
      <div class="form-group">
        <label for="email" class="form-label">Email</label>
        <div class="input-wrapper">
          <fa-icon [icon]="faEnvelope" class="input-icon"></fa-icon>
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-input"
            placeholder="seu@email.com"
            [class.error]="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched">
        </div>
        <div *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched" class="error-message">
          <span *ngIf="forgotPasswordForm.get('email')?.errors?.['required']">Email é obrigatório</span>
          <span *ngIf="forgotPasswordForm.get('email')?.errors?.['email']">Email inválido</span>
        </div>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="submit-button"
        [disabled]="isLoading || forgotPasswordForm.invalid">
        <span *ngIf="isLoading" class="spinner"></span>
        Enviar Email
      </button>
    </form>
  </div>
</div>
