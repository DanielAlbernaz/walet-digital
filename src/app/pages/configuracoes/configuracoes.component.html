<app-dashboard-layout>
  <div class="configuracoes-page">
    <!-- Header Section -->
    <div class="configuracoes-header">
      <div class="header-left">
        <h1 class="page-title">Configurações</h1>
        <p class="page-subtitle">Personalize sua experiência no FinançasPro</p>
      </div>
    </div>

    <!-- Settings Groups -->
    <div class="settings-groups">
      <div *ngFor="let group of settingsGroups; let groupIndex = index" class="settings-card">
        <!-- Card Header -->
        <div class="card-header">
          <fa-icon [icon]="group.icon" class="card-icon"></fa-icon>
          <h2 class="card-title">{{ group.title }}</h2>
        </div>

        <!-- Settings Items -->
        <div class="settings-items">
          <div *ngFor="let item of group.items; let itemIndex = index" class="setting-item">
            <div *ngIf="itemIndex > 0" class="item-divider"></div>
            
            <div class="setting-content">
              <div class="setting-info">
                <p class="setting-label">{{ item.label }}</p>
                <p class="setting-description">{{ item.description }}</p>
              </div>
              
              <div class="setting-control">
                <label *ngIf="item.toggle" class="toggle-switch">
                  <input 
                    type="checkbox" 
                    [checked]="item.value"
                    (change)="onToggleChange(groupIndex, itemIndex)">
                  <span class="toggle-slider"></span>
                </label>
                
                <button 
                  *ngIf="!item.toggle" 
                  type="button" 
                  class="btn-access"
                  (click)="onAccessClick(item.label)">
                  Acessar
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</app-dashboard-layout>
