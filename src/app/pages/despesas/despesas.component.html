<app-dashboard-layout>
  <app-loading-overlay [isLoading]="isLoading"></app-loading-overlay>

  <div class="despesas-page">
    <!-- Header Section -->
    <app-financial-page-header
      [title]="'Despesas'"
      [subtitle]="'Gerencie suas saídas financeiras'"
      [total]="totalExpenses"
      [type]="'despesa'">
    </app-financial-page-header>

    <!-- Month Selector -->
    <app-month-selector (monthChanged)="onMonthChanged($event)"></app-month-selector>

    <!-- Search and Filter Bar -->
    <app-financial-search-bar
      [placeholder]="'Buscar despesas...'"
      [(searchQuery)]="searchQuery">
    </app-financial-search-bar>

    <!-- Empty States or List -->
    <div *ngIf="hasNoExpensesInMonth">
      <app-financial-empty-state
        [type]="'despesa'"
        [emptyStateType]="'no-items'"
        (addClick)="onFabClick()">
      </app-financial-empty-state>
    </div>

    <div *ngIf="searchHasNoResults">
      <app-financial-empty-state
        [type]="'despesa'"
        [emptyStateType]="'no-results'">
      </app-financial-empty-state>
    </div>

    <app-financial-list
      *ngIf="filteredExpenses.length > 0"
      [items]="filteredExpenses"
      [type]="'despesa'"
      (itemClick)="onExpenseClick($event)">
    </app-financial-list>
  </div>

  <app-floating-action-button *appPermission="'create'" (clicked)="onFabClick()"></app-floating-action-button>
</app-dashboard-layout>

<app-transaction-modal
  [isOpen]="isModalOpen"
  [releaseToEdit]="selectedRelease"
  (close)="onCloseModal()"
  (saved)="onTransactionSaved()">
</app-transaction-modal>
